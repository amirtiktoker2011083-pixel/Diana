<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    /* FIX: включаем скролл */
    overflow-y:auto;

    min-height:100vh;

    background:
    linear-gradient(
    180deg,
    #fff4fa 0%,
    #ffd6ea 45%,
    #ffbddb 100%
    );

    position:relative;
}

/* TIME */
.time-box{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:12px 32px;
    border-radius:999px;
    z-index:9999;
    box-shadow:0 0 20px rgba(255,255,255,0.9);
}

#clock{
    color:#ff7eb7;
    font-size:24px;
    font-weight:bold;
}

/* SAKURA */
.sakura{
    position:fixed;
    top:-50px;
    pointer-events:none;
    z-index:999;
    animation:sakuraFall linear forwards;
}

@keyframes sakuraFall{
    0%{
        transform:translateY(-100px);
        opacity:0;
    }
    10%{opacity:1;}
    100%{
        transform:translateY(120vh)
        translateX(calc(-40px + 80px * var(--random)))
        rotate(360deg);
        opacity:0;
    }
}

/* CONTAINER */
.container{
    position:relative;
    z-index:5;
    width:100%;
    padding-top:90px;

    display:flex;
    flex-direction:column;
    align-items:center;
}

/* FIX CENTER BUTTON */
.love-btn{
    margin:20px auto 40px;
    display:inline-block;

    text-decoration:none;
    background:#ff8fc7;
    color:white;
    padding:14px 34px;
    border-radius:999px;
    font-size:18px;
    font-weight:bold;
}

/* PHOTOS */
.photos{
    width:100%;
    position:relative;
    height:700px;
}

.photo{
    position:absolute;
    width:38vw;
    max-width:170px;
    border-radius:18px;
    border:3px solid white;
    box-shadow:0 0 20px rgba(255,255,255,0.9);
}

/* POSITIONS */
.photo1{top:20px;left:20px;rotate:-5deg;}
.photo2{top:250px;right:20px;rotate:5deg;}
.photo3{top:500px;left:70px;rotate:-4deg;}

/* PLAYLIST */
.playlist{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-bottom:60px;
}

.playlist-title{
    color:white;
    font-size:42px;
    margin-bottom:25px;
    text-shadow:0 0 10px white;
}

/* TRACKS */
.track{
    width:290px;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(10px);
    padding:16px;
    border-radius:20px;
    border:2px solid white;
    margin-bottom:18px;
    color:white;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
}

.track:hover{
    transform:scale(1.03);
}

.track.active{
    background:rgba(255,255,255,0.35);
}

/* CONTROLS */
.controls{
    display:none;
    gap:30px;
    margin-top:10px;
    margin-bottom:20px;
}

.controls.show{
    display:flex;
}

.controls span{
    width:58px;
    height:58px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:26px;
}

/* MOBILE */
@media(max-width:600px){
    .photos{height:640px;}
    .photo{width:42vw;}
    .track{width:88%;}
}

</style>
</head>

<body>

<!-- CLOCK -->
<div class="time-box">
    <span id="clock">00 : 00</span>
</div>

<div class="container">

    <!-- BUTTON FIXED -->
    <a href="https://t.me/ilmbfsmDD" target="_blank" class="love-btn">
        Люблю Диану
    </a>

    <!-- PHOTOS -->
    <div class="photos">
        <img src="d1.jpg" class="photo photo1">
        <img src="d2.jpg" class="photo photo2">
        <img src="d3.jpg" class="photo photo3">
    </div>

    <!-- PLAYLIST -->
    <div class="playlist">

        <div class="playlist-title">playlist</div>

        <div class="track" onclick="playTrack(0)">spicy</div>
        <div class="track" onclick="playTrack(1)">Тебе нравится</div>
        <div class="track" onclick="playTrack(2)">Ведь Меня Погубила Глубина Этих Глаз</div>
        <div class="controls" id="controls">
            <span onclick="prev()">⏮️</span>
            <span id="playBtn" onclick="toggle()">▶️</span>
            <span onclick="next()">⏭️</span>
        </div>

    </div>
</div>

<audio id="audio" playsinline preload="auto"></audio>

<script>

/* SAKURA */
function createSakura(){
    const s=document.createElement("div");
    s.className="sakura";
    s.innerHTML="🌸";
    s.style.left=Math.random()*100+"vw";
    s.style.setProperty("--random",Math.random());
    s.style.animationDuration=(8+Math.random()*8)+"s";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),17000);
}
setInterval(createSakura,350);

/* CLOCK */
function updateClock(){
    const d=new Date();
    let h=d.getHours();
    let m=d.getMinutes();
    if(h<10)h="0"+h;
    if(m<10)m="0"+m;
    document.getElementById("clock").innerText=h+" : "+m;
}
setInterval(updateClock,1000);
updateClock();

/* AUDIO TRACKS (ВАШИ РАБОЧИЕ СООТВЕТСТВИЯ) */
const tracks=[
    "mp1.mp3", // spicy
    "mp2.mp3", // Тебе нравится
    "mp3.mp3"  // Глубина глаз
];

let current=0;

const audio=document.getElementById("audio");
const trackEls=document.querySelectorAll(".track");
const controls=document.getElementById("controls");
const playBtn=document.getElementById("playBtn");

/* PLAY */
function playTrack(i){

    current=i;

    audio.pause();
    audio.src=tracks[i];
    audio.load();

    const playPromise = audio.play();

    if(playPromise !== undefined){
        playPromise.then(()=>{
            playBtn.innerText="⏸️";
        }).catch(err=>{
            console.log("Audio error:",err);
        });
    }

    trackEls.forEach(t=>t.classList.remove("active"));
    trackEls[i].classList.add("active");

    /* FIX: не ломаем DOM через after() */
    controls.classList.add("show");
}

/* TOGGLE */
function toggle(){
    if(audio.paused){
        audio.play();
        playBtn.innerText="⏸️";
    }else{
        audio.pause();
        playBtn.innerText="▶️";
    }
}

/* NEXT */
function next(){
    current=(current+1)%tracks.length;
    playTrack(current);
}

/* PREV */
function prev(){
    current=(current-1+tracks.length)%tracks.length;
    playTrack(current);
}

audio.addEventListener("ended",next);

</script>

</body>
</html>
