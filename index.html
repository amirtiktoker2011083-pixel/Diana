<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    font-family:Arial,sans-serif;

    background:
    linear-gradient(
    180deg,
    #ffd6ea,
    #ffc7e2,
    #ffb8da
    );

    position:relative;
}

/* МЯГКИЕ ПЯТНА */

body::before{
    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:rgba(255,255,255,0.12);

    border-radius:50%;

    top:-120px;
    left:-120px;

    filter:blur(25px);
}

body::after{
    content:"";

    position:absolute;

    width:400px;
    height:400px;

    background:rgba(255,255,255,0.1);

    border-radius:50%;

    bottom:-100px;
    right:-100px;

    filter:blur(20px);
}

/* ФОТО БЕЗ РАМОК */

.photo{
    position:absolute;

    width:140px;

    z-index:3;

    transition:0.3s;
}

.photo:hover{
    transform:scale(1.05);
}

/* ХАОТИЧНОЕ РАСПОЛОЖЕНИЕ */

.photo1{
    top:120px;
    left:25px;

    transform:rotate(-5deg);
}

.photo2{
    top:310px;
    right:30px;

    transform:rotate(6deg);
}

.photo3{
    bottom:130px;
    left:75px;

    transform:rotate(-4deg);
}

/* САКУРА */

.sakura{
    position:absolute;

    top:-50px;

    font-size:28px;

    opacity:0.8;

    animation:fall linear infinite;

    z-index:1;

    pointer-events:none;
}

/* РАЗНЫЕ ЛЕПЕСТКИ */

.s1{
    left:5%;
    animation-duration:12s;
}

.s2{
    left:15%;
    animation-duration:18s;
    animation-delay:2s;
}

.s3{
    left:28%;
    animation-duration:14s;
    animation-delay:1s;
}

.s4{
    left:42%;
    animation-duration:20s;
    animation-delay:3s;
}

.s5{
    left:56%;
    animation-duration:13s;
}

.s6{
    left:68%;
    animation-duration:17s;
    animation-delay:2s;
}

.s7{
    left:82%;
    animation-duration:15s;
    animation-delay:4s;
}

.s8{
    left:92%;
    animation-duration:19s;
}

/* АНИМАЦИЯ */

@keyframes fall{

    0%{
        transform:
        translateY(-100px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:0.9;
    }

    100%{
        transform:
        translateY(120vh)
        translateX(60px)
        rotate(360deg);

        opacity:0;
    }
}

</style>
</head>

<body>

<!-- ПАДАЮЩАЯ САКУРА -->

<div class="sakura s1">🌸</div>
<div class="sakura s2">🌸</div>
<div class="sakura s3">🌸</div>
<div class="sakura s4">🌸</div>
<div class="sakura s5">🌸</div>
<div class="sakura s6">🌸</div>
<div class="sakura s7">🌸</div>
<div class="sakura s8">🌸</div>

<!-- ФОТО -->

<img src="d1.jpg" class="photo photo1" alt="">
<img src="d2.jpg" class="photo photo2" alt="">
<img src="d3.jpg" class="photo photo3" alt="">

</body>
</html>
