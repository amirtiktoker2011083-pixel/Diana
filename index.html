<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    background:url("fon.jpg") no-repeat center center;
    background-size:cover;

    font-family:Arial,sans-serif;
}

.container{
    position:relative;
    width:100%;
    height:100%;
}

/* ОКНА */

.frame{
    position:absolute;

    width:145px;
    height:145px;

    overflow:hidden;

    border-radius:12px;

    background:white;

    border:5px solid black;
}

.frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ПОЗИЦИИ */

.frame1{
    top:120px;
    left:35px;

    transform:rotate(-1deg);
}

.frame2{
    top:430px;
    right:35px;

    transform:rotate(1deg);
}

.frame3{
    bottom:170px;
    left:35px;

    transform:rotate(-1deg);
}

/* ПАДАЮЩИЕ ЗАЙЧИКИ */

.bunny-fall{
    position:absolute;

    width:90px;

    top:-120px;

    animation:fall linear infinite;

    pointer-events:none;
}

/* РАЗНЫЕ ПОЗИЦИИ */

.b1{
    left:5%;
    animation-duration:18s;
}

.b2{
    left:25%;
    animation-duration:22s;
}

.b3{
    left:45%;
    animation-duration:20s;
}

.b4{
    left:65%;
    animation-duration:24s;
}

.b5{
    left:82%;
    animation-duration:19s;
}

/* АНИМАЦИЯ */

@keyframes fall{

    0%{
        transform:translateY(-150px) rotate(0deg);
    }

    100%{
        transform:translateY(120vh) rotate(360deg);
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- ФОТО -->

    <div class="frame frame1">
        <img src="d1.jpg" alt="">
    </div>

    <div class="frame frame2">
        <img src="d2.jpg" alt="">
    </div>

    <div class="frame frame3">
        <img src="d3.jpg" alt="">
    </div>

    <!-- ПАДАЮЩИЕ ЗАЙЧИКИ -->

    <img src="bunny.png" class="bunny-fall b1" alt="">
    <img src="bunny.png" class="bunny-fall b2" alt="">
    <img src="bunny.png" class="bunny-fall b3" alt="">
    <img src="bunny.png" class="bunny-fall b4" alt="">
    <img src="bunny.png" class="bunny-fall b5" alt="">

</div>

</body>
</html>
