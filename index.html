<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    overflow-x:hidden;

    min-height:100vh;

    background:
    linear-gradient(
    135deg,
    #fff0f7 0%,
    #ffd6ea 30%,
    #ffb6d9 60%,
    #fff0f7 100%
    );

    position:relative;
}

/* 🌸 САКУРА */

.sakura{

    position:fixed;

    top:-100px;

    font-size:24px;

    pointer-events:none;

    animation:fall linear infinite;

    z-index:1;
}

@keyframes fall{

    0%{
        transform:
        translateY(-100px)
        translateX(0px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(120vh)
        translateX(60px)
        rotate(360deg);

        opacity:0;
    }
}

/* КОНТЕЙНЕР */

.container{

    position:relative;

    z-index:3;

    width:100%;

    padding-top:40px;

    display:flex;

    flex-direction:column;

    align-items:center;
}

/* ФОТО */

.photos{

    width:100%;

    position:relative;

    height:700px;
}

.photo{

    position:absolute;

    width:38vw;

    max-width:170px;

    border-radius:12px;

    box-shadow:
    0 0 15px rgba(255,255,255,0.5);

    transition:0.3s;
}

.photo:hover{

    transform:scale(1.03);
}

/* РАСПОЛОЖЕНИЕ */

.photo1{

    top:40px;
    left:20px;

    transform:rotate(-5deg);
}

.photo2{

    top:240px;
    right:20px;

    transform:rotate(5deg);
}

.photo3{

    top:500px;
    left:70px;

    transform:rotate(-4deg);
}

/* PLAYLIST */

.playlist{

    width:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

    margin-top:20px;

    padding-bottom:50px;
}

/* ЗАГОЛОВОК */

.playlist h1{

    color:white;

    font-size:42px;

    margin-bottom:25px;

    text-shadow:
    0 0 6px white,
    0 0 12px white,
    0 0 20px rgba(255,255,255,0.8);
}

/* ТРЕК */

.track{

    width:90%;

    max-width:320px;

    margin-bottom:25px;

    text-align:center;
}

.track p{

    color:white;

    margin-bottom:8px;

    font-size:18px;

    text-shadow:
    0 0 10px white,
    0 0 20px white;
}

/* АУДИО */

audio{

    width:100%;
}

/* ПК ВЕРСИЯ */

@media(min-width:768px){

    .photos{
        height:650px;
    }

    .photo{
        width:180px;
    }

    .photo1{
        left:140px;
    }

    .photo2{
        right:140px;
    }

    .photo3{
        left:220px;
    }

    .playlist h1{
        font-size:52px;
    }
}

</style>
</head>

<body>

<!-- 🌸 САКУРА -->

<div class="sakura" style="left:2%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:6%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:10%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:15%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:20%;animation-duration:9s;">🌸</div>

<div class="sakura" style="left:25%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:30%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:35%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:40%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:45%;animation-duration:7s;">🌸</div>

<div class="sakura" style="left:50%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:55%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:60%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:65%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:70%;animation-duration:8s;">🌸</div>

<div class="sakura" style="left:75%;animation-duration:6s;">🌸</div>
<div class="sakura" style="left:80%;animation-duration:9s;">🌸</div>
<div class="sakura" style="left:85%;animation-duration:7s;">🌸</div>
<div class="sakura" style="left:90%;animation-duration:8s;">🌸</div>
<div class="sakura" style="left:95%;animation-duration:6s;">🌸</div>

<div class="container">

    <!-- ФОТО -->
    <div class="photos">

        <img src="d1.jpg" class="photo photo1">

        <img src="d2.jpg" class="photo photo2">

        <img src="d3.jpg" class="photo photo3">

    </div>

    <!-- PLAYLIST -->

    <div class="playlist">

        <h1>playlist</h1>

        <div class="track">

            <p>spicy</p>

            <audio controls>
                <source src="spicy.mp3" type="audio/mpeg">
            </audio>

        </div>

        <div class="track">

            <p>Ведь Меня Погубила Глубина Этих Глаз</p>

            <audio controls>
                <source src="Ведь Меня Погубила Глубина Этих Глаз.mp3" type="audio/mpeg">
            </audio>

        </div>

        <div class="track">

            <p>Тебе нравится</p>

            <audio controls>
                <source src="Тебе нравится.mp3" type="audio/mpeg">
            </audio>

        </div>

    </div>

</div>

</body>
</html>
