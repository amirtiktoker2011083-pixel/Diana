<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diana Sakura</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    overflow:hidden;

    font-family:Arial,sans-serif;

    /* РОЗОВЫЙ ФОН В ГОРОШЕК */

    background-color:#ffb6d9;

    background-image:
    radial-gradient(white 2px, transparent 2px);

    background-size:40px 40px;

    position:relative;
}

/* МЯГКИЕ ПЯТНА */

body::before{
    content:"";

    position:absolute;

    width:500px;
    height:500px;

    background:rgba(255,255,255,0.12);

    border-radius:50%;

    top:-120px;
    left:-120px;

    filter:blur(30px);
}

body::after{
    content:"";

    position:absolute;

    width:400px;
    height:400px;

    background:rgba(255,255,255,0.1);

    border-radius:50%;

    bottom:-100px;
    right:-100px;

    filter:blur(25px);
}

/* ФОТО */

.photo{
    position:absolute;

    width:145px;

    z-index:3;

    transition:0.3s;
}

.photo:hover{
    transform:scale(1.05);
}

/* ХАОТИЧНО */

.photo1{
    top:110px;
    left:25px;

    transform:rotate(-5deg);
}

.photo2{
    top:290px;
    right:30px;

    transform:rotate(6deg);
}

.photo3{
    bottom:120px;
    left:75px;

    transform:rotate(-4deg);
}

/* САКУРА */

.sakura{
    position:absolute;

    top:-60px;

    font-size:28px;

    opacity:0.9;

    animation:fall linear infinite;

    z-index:1;

    pointer-events:none;
}

/* АНИМАЦИЯ */

@keyframes fall{

    0%{
        transform:
        translateY(-100px)
        rotate(0deg);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
        translateY(120vh)
        translateX(70px)
        rotate(360deg);

        opacity:0;
    }
}

</style>
</head>

<body>
